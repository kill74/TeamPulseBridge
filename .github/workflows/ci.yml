name: CI

on:
  push:
    paths:
      - "services/ingestion-gateway/**"
      - ".github/actions/setup-ingestion-gateway-go/**"
      - ".github/workflows/ci.yml"
      - ".golangci.yml"
  pull_request:
    paths:
      - "services/ingestion-gateway/**"
      - ".github/actions/setup-ingestion-gateway-go/**"
      - ".github/workflows/ci.yml"
      - ".golangci.yml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: ./.github/actions/setup-ingestion-gateway-go
        with:
          go-version: "1.25.x"

      - name: Tidy modules
        working-directory: services/ingestion-gateway
        run: |
          set -e
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with coverage
        shell: bash
        run: |
          set -e
          go test -race -count=1 -coverprofile=services/ingestion-gateway/coverage.out ./services/ingestion-gateway/...

      - name: Check coverage threshold
        shell: bash
        run: |
          set -e
          COVERAGE=$(go tool cover -func=services/ingestion-gateway/coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=65
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage meets threshold"

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.61.0
          working-directory: services/ingestion-gateway
          args: --timeout=5m

  contracts:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/ingestion-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: ./.github/actions/setup-ingestion-gateway-go
        with:
          go-version: "1.25.x"

      - name: Run fixture linter
        run: go run ./cmd/fixturelint

      - name: Run contract and schema drift tests
        run: go test -count=1 ./internal/handlers ./internal/queue -run 'TestWebhookFixtureCatalog|TestWebhookPayloadContracts|TestWebhookCompatibilityMatrix|TestRawWebhookEnvelopeSchema'
