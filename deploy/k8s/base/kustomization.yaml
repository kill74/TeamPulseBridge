apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
labels:
  - pairs:
      app.kubernetes.io/name: ingestion-gateway
      app.kubernetes.io/part-of: teampulse-bridge
      app.kubernetes.io/managed-by: gitops
images:
  - name: ghcr.io/kill74/teampulse-ingestion-gateway
    newTag: latest
