apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ingestion-gateway-staging
resources:
  - ../../base
patches:
  - path: patch-configmap.yaml
  - path: patch-deployment.yaml
  - path: patch-hpa.yaml
labels:
  - pairs:
      app.kubernetes.io/environment: staging
images:
  - name: ghcr.io/kill74/teampulse-ingestion-gateway
    newTag: main
