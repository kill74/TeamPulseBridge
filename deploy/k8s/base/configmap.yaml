apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-gateway-config
data:
  PORT: "8080"
  REQUEST_TIMEOUT_SEC: "15"
  QUEUE_BUFFER: "4096"
  QUEUE_WORKERS: "2"
  QUEUE_BULKHEAD_ENABLED: "true"
  QUEUE_BULKHEAD_BUFFER_PER_SOURCE: "1024"
  QUEUE_BACKPRESSURE_ENABLED: "true"
  QUEUE_BACKPRESSURE_SOFT_LIMIT_PERCENT: "70"
  QUEUE_BACKPRESSURE_HARD_LIMIT_PERCENT: "90"
  QUEUE_FAILURE_BUDGET_PERCENT: "15"
  QUEUE_FAILURE_BUDGET_WINDOW: "100"
  QUEUE_FAILURE_BUDGET_MIN_SAMPLES: "20"
  QUEUE_THROTTLE_RETRY_AFTER_SEC: "5"
  QUEUE_BACKEND: "pubsub"
  PUBSUB_PUBLISH_GOROUTINES: "4"
  PUBSUB_MAX_OUTSTANDING_MESSAGES: "2000"
  PUBSUB_MAX_OUTSTANDING_BYTES: "67108864"
  PUBSUB_FLOW_CONTROL_BEHAVIOR: "signal_error"
  SOURCE_RATE_LIMIT_DEFAULT: "100"
  RATE_LIMIT_BACKEND: "redis"
  REDIS_ADDR: "redis:6379"
  REQUIRE_SECRETS: "true"
  ENVIRONMENT: "staging"
  ADMIN_AUTH_ENABLED: "true"
  SECURITY_AUDIT_ENABLED: "true"
  SECURITY_AUDIT_PATH: "data/security-audit.jsonl"
  SECURITY_AUDIT_RETENTION_DAYS: "30"
  PUBSUB_TOPIC_ID: "teampulse-events"
