name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download modules
        working-directory: services/ingestion-gateway
        run: go mod download

      - name: Tidy modules
        working-directory: services/ingestion-gateway
        run: go mod tidy

      - name: Run tests
        working-directory: services/ingestion-gateway
        run: go test ./...

      - name: Run linter
        working-directory: services/ingestion-gateway
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest