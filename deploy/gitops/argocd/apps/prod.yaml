apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingestion-gateway-prod
  namespace: argocd
spec:
  project: teampulse
  source:
    repoURL: https://github.com/kill74/TeamPulseBridge.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ingestion-gateway-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
