services:
  pubsub-emulator:
    image: google/cloud-sdk:emulators
    container_name: teampulse-pubsub-emulator
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - '8085:8085'
    profiles:
      - pubsub-local
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/127.0.0.1/8085"']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s

  pubsub-init:
    image: google/cloud-sdk:emulators
    container_name: teampulse-pubsub-init
    profiles:
      - pubsub-local
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: >
      bash -lc "
      gcloud pubsub topics create webhook-events --project=test-project || true;
      gcloud pubsub subscriptions create webhook-events-store --topic=webhook-events --project=test-project || true
      "
    depends_on:
      pubsub-emulator:
        condition: service_healthy

  ingestion-gateway:
    build:
      context: ./services/ingestion-gateway
      dockerfile: Dockerfile
    container_name: teampulse-ingestion-gateway
    environment:
      PORT: 8080
      REQUIRE_SECRETS: 'true'
      QUEUE_BACKEND: ${QUEUE_BACKEND:-log}
      ADMIN_AUTH_ENABLED: 'true'
      ENVIRONMENT: local
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://teampulse:secret@postgres:5432/teampulse?sslmode=disable
      RATE_LIMIT_BACKEND: redis
      ADMIN_JWT_ISSUER: local
      ADMIN_JWT_AUDIENCE: local
      ADMIN_JWT_SECRET: local-dev-must-be-32-chars-long-or-more
      PUBSUB_EMULATOR_HOST: ${PUBSUB_EMULATOR_HOST:-}
      PUBSUB_PROJECT_ID: ${PUBSUB_PROJECT_ID:-test-project}
      PUBSUB_TOPIC_ID: ${PUBSUB_TOPIC_ID:-webhook-events}
    ports:
      - '8080:8080'
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  event-store:
    build:
      context: ./services/ingestion-gateway
      dockerfile: Dockerfile
    container_name: teampulse-event-store
    entrypoint: ["/app/eventstore"]
    profiles:
      - pubsub-local
    environment:
      DATABASE_URL: postgres://teampulse:secret@postgres:5432/teampulse?sslmode=disable
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      PUBSUB_PROJECT_ID: test-project
      EVENTSTORE_PUBSUB_SUBSCRIPTION_ID: webhook-events-store
      EVENTSTORE_MAX_OUTSTANDING_MESSAGES: 100
      EVENTSTORE_RECEIVE_GOROUTINES: 1
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    container_name: teampulse-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: teampulse-postgres
    environment:
      POSTGRES_USER: teampulse
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: teampulse
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teampulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: teampulse-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - ingestion-gateway

  grafana:
    image: grafana/grafana:11.2.0
    container_name: teampulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-teampulse-local-dev-password-change-in-production}
    ports:
      - '3000:3000'
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
