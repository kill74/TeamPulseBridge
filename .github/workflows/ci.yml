name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download modules
        working-directory: services/ingestion-gateway
        run: go mod download

      - name: Tidy modules
        working-directory: services/ingestion-gateway
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        working-directory: services/ingestion-gateway
        run: go test ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: services/ingestion-gateway
          args: --timeout=5m
