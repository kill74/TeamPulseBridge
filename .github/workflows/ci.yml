name: ci

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/ingestion-gateway/go.mod
          cache-dependency-path: services/ingestion-gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Go fmt check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          working-directory: services/ingestion-gateway
          args: --config ../../.golangci.yml ./...

      - name: Vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.22'
          work-dir: services/ingestion-gateway
