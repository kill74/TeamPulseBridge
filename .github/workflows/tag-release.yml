name: tag-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag (example: v1.2.3)"
        required: true
        type: string
      checklist_risk_reviewed:
        description: "Release checklist: risk level, blast radius, and rollout strategy reviewed"
        required: true
        type: boolean
        default: false
      checklist_rollback_ready:
        description: "Release checklist: rollback path is documented and validated"
        required: true
        type: boolean
        default: false
      checklist_monitoring_ready:
        description: "Release checklist: monitoring and post-deploy verification are ready"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SemVer tag: $VERSION"
            exit 1
          fi

      - name: Enforce default branch dispatch
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "tag-release must run from default branch: ${{ github.event.repository.default_branch }}"
            exit 1
          fi

      - name: Validate automated release readiness gates
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.repository.default_branch;
            const requiredWorkflows = [
              { file: "ci.yml", name: "ci" },
              { file: "smoke.yml", name: "smoke" },
              { file: "docs.yml", name: "docs" },
              { file: "integration.yml", name: "integration" },
            ];

            const branchInfo = await github.rest.repos.getBranch({ owner, repo, branch });
            const headSha = branchInfo.data.commit.sha;
            const failures = [];
            const summaryLines = [];

            for (const workflow of requiredWorkflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.file,
                branch,
                per_page: 20,
              });

              const matchingRun = runs.data.workflow_runs.find((run) => run.head_sha === headSha && run.status === "completed");
              if (!matchingRun) {
                failures.push(`No completed ${workflow.name} workflow run was found for ${branch}@${headSha}.`);
                summaryLines.push(`- ${workflow.name}: missing for ${headSha}`);
                continue;
              }

              summaryLines.push(`- ${workflow.name}: ${matchingRun.conclusion} (${matchingRun.html_url})`);
              if (matchingRun.conclusion !== "success") {
                failures.push(`${workflow.name} workflow for ${branch}@${headSha} concluded ${matchingRun.conclusion}.`);
              }
            }

            await core.summary
              .addHeading("Automated Release Checklist")
              .addRaw(`- Default branch: ${branch}\n`)
              .addRaw(`- Default branch HEAD: ${headSha}\n`)
              .addRaw(summaryLines.join("\n") + "\n")
              .write();

            if (failures.length > 0) {
              core.setFailed(failures.join("\n"));
            }

      - name: Validate release checklist gates
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.checklist_risk_reviewed }}" != "true" ]]; then
            echo "Checklist gate failed: risk review must be completed"
            exit 1
          fi
          if [[ "${{ github.event.inputs.checklist_rollback_ready }}" != "true" ]]; then
            echo "Checklist gate failed: rollback readiness must be confirmed"
            exit 1
          fi
          if [[ "${{ github.event.inputs.checklist_monitoring_ready }}" != "true" ]]; then
            echo "Checklist gate failed: monitoring and verification readiness must be confirmed"
            exit 1
          fi

      - name: Publish checklist summary
        shell: bash
        run: |
          {
            echo "## Release Checklist Validation"
            echo
            echo "- Version: ${{ github.event.inputs.version }}"
            echo "- Automated workflow gates: validated against the current default branch head"
            echo "- Risk reviewed: ${{ github.event.inputs.checklist_risk_reviewed }}"
            echo "- Rollback ready: ${{ github.event.inputs.checklist_rollback_ready }}"
            echo "- Monitoring ready: ${{ github.event.inputs.checklist_monitoring_ready }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure tag does not exist
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
