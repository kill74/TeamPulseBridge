quiet: true
compact: true
soft-fail: false

# Focus on Terraform and Kubernetes policy-as-code checks in CI.
framework:
  - terraform
  - kubernetes

# Keep scans deterministic and scoped to IaC directories.
download-external-modules: false

# Current IaC enforcement is scoped to the project's implemented baseline.
# The controls below remain tracked backlog items rather than merge blockers.
skip-check:
