groups:
  - name: ingestion-gateway-slo-recording
    interval: 30s
    rules:
      - record: teampulse:webhook_requests:rate5m
        expr: sum(rate(webhook_requests_total[5m]))

      - record: teampulse:webhook_errors:rate5m
        expr: sum(rate(webhook_requests_total{status=~"5.."}[5m]))

      - record: teampulse:webhook_error_ratio:5m
        expr: teampulse:webhook_errors:rate5m / clamp_min(teampulse:webhook_requests:rate5m, 0.001)

      - record: teampulse:webhook_error_ratio:1h
        expr: sum(rate(webhook_requests_total{status=~"5.."}[1h])) / clamp_min(sum(rate(webhook_requests_total[1h])), 0.001)

      - record: teampulse:webhook_error_ratio:6h
        expr: sum(rate(webhook_requests_total{status=~"5.."}[6h])) / clamp_min(sum(rate(webhook_requests_total[6h])), 0.001)

      - record: teampulse:webhook_error_budget_burn:5m
        expr: teampulse:webhook_error_ratio:5m / 0.001

      - record: teampulse:webhook_error_budget_burn:1h
        expr: teampulse:webhook_error_ratio:1h / 0.001

      - record: teampulse:webhook_error_budget_burn:6h
        expr: teampulse:webhook_error_ratio:6h / 0.001

      - record: teampulse:webhook_availability:30d
        expr: 1 - (sum(increase(webhook_requests_total{status=~"5.."}[30d])) / clamp_min(sum(increase(webhook_requests_total[30d])), 1))

      - record: teampulse:webhook_error_budget_consumed:30d
        expr: (1 - teampulse:webhook_availability:30d) / 0.001

      - record: teampulse:queue_backpressure:rate5m
        expr: sum(rate(queue_backpressure_events_total{action=~"throttled|full"}[5m]))

      - record: teampulse:queue_backpressure_ratio:5m
        expr: teampulse:queue_backpressure:rate5m / clamp_min(teampulse:webhook_requests:rate5m, 0.001)

      - record: teampulse:queue_publish_failures:rate5m
        expr: sum(rate(queue_publish_outcomes_total{result="failed"}[5m]))

      - record: teampulse:queue_publish_failure_ratio:5m
        expr: teampulse:queue_publish_failures:rate5m / clamp_min(sum(rate(queue_publish_outcomes_total[5m])), 0.001)

  - name: ingestion-gateway-slo-alerts
    interval: 30s
    rules:
      - alert: IngestionGatewaySLOErrorBudgetFastBurn
        expr: teampulse:webhook_error_budget_burn:5m > 14.4 and teampulse:webhook_error_budget_burn:1h > 14.4
        for: 5m
        labels:
          severity: critical
          service: ingestion-gateway
        annotations:
          summary: "Ingestion Gateway is burning error budget too quickly"
          description: "Burn rate is high over both 5m and 1h windows for the 99.9% SLO."

      - alert: IngestionGatewaySLOErrorBudgetSlowBurn
        expr: teampulse:webhook_error_budget_burn:1h > 3 and teampulse:webhook_error_budget_burn:6h > 3
        for: 30m
        labels:
          severity: warning
          service: ingestion-gateway
        annotations:
          summary: "Ingestion Gateway is steadily consuming error budget"
          description: "Burn rate is elevated over both 1h and 6h windows for the 99.9% SLO."

      - alert: IngestionGatewayQueueBackpressureSustained
        expr: teampulse:queue_backpressure_ratio:5m > 0.02
        for: 10m
        labels:
          severity: warning
          service: ingestion-gateway
        annotations:
          summary: "Ingestion Gateway is shedding traffic because queue pressure is sustained"
          description: "Queue backpressure events are above 2% of webhook traffic for 10 minutes."

      - alert: IngestionGatewayQueuePublishFailuresHigh
        expr: teampulse:queue_publish_failure_ratio:5m > 0.05
        for: 10m
        labels:
          severity: critical
          service: ingestion-gateway
        annotations:
          summary: "Ingestion Gateway queue publish failures are elevated"
          description: "More than 5% of queue publish attempts are failing over the last 5 minutes."

  - name: ingestion-gateway-security-recording
    interval: 30s
    rules:
      - record: teampulse:security_rejections:rate1m
        expr: sum(rate(security_rejections_total[1m]))

      - record: teampulse:security_rejections:rate5m
        expr: sum(rate(security_rejections_total[5m]))

      - record: teampulse:security_rejections:rate5m_by_reason
        expr: sum(rate(security_rejections_total[5m])) by (reason)

      - record: teampulse:security_rejections:rate5m_by_status
        expr: sum(rate(security_rejections_total[5m])) by (status)

      - record: teampulse:security_rejections_ratio:5m
        expr: teampulse:security_rejections:rate5m / clamp_min(sum(rate(webhook_requests_total[5m])), 0.001)

  - name: ingestion-gateway-security-alerts
    interval: 30s
    rules:
      - alert: IngestionGatewaySecurityRejectionsBurst
        expr: teampulse:security_rejections:rate1m > 2
        for: 5m
        labels:
          severity: warning
          service: ingestion-gateway
        annotations:
          summary: "Ingestion Gateway is seeing a burst of security rejections"
          description: "Security rejection rate is above 2 requests per second over the last minute for 5 minutes."

      - alert: IngestionGatewayPotentialAdminAbuse
        expr: sum(rate(security_rejections_total{reason=~"admin_.*"}[5m])) > 0.5
        for: 10m
        labels:
          severity: critical
          service: ingestion-gateway
        annotations:
          summary: "Possible abuse on administrative endpoints"
          description: "Security rejections with reason=admin_* are above 0.5 requests per second for 10 minutes."
