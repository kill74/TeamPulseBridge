name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Build changelog entry
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)
          {
            echo "## ${TAG} - $(date +%Y-%m-%d)"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo
          } > release-notes.md

      - name: Preserve release notes across checkout
        shell: bash
        run: cp release-notes.md /tmp/release-notes.md

      - name: Setup ingestion-gateway Go
        uses: ./.github/actions/setup-ingestion-gateway-go

      - name: Build release artifacts
        shell: bash
        run: |
          bash ./scripts/release/build-release-artifacts.sh "${GITHUB_REF_NAME}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign release artifacts (keyless)
        shell: bash
        run: |
          mapfile -t artifacts < release-artifacts.txt
          for artifact in "${artifacts[@]}" "SHA256SUMS"; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "${artifact}"
          done

      - name: Verify signed artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${TAG}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          mapfile -t artifacts < release-artifacts.txt
          sha256sum -c SHA256SUMS

          for artifact in "${artifacts[@]}" "SHA256SUMS"; do
            cosign verify-blob \
              --signature "${artifact}.sig" \
              --certificate "${artifact}.pem" \
              --certificate-identity "$CERT_IDENTITY" \
              --certificate-oidc-issuer "$CERT_ISSUER" \
              "${artifact}"
          done

      - name: Render release checklist
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          {
            echo "# Release Checklist"
            echo
            echo "- Version: ${TAG}"
            echo "- Workflow: release.yml"
            echo "- Signed artifacts: yes"
            echo "- Checksums verified: yes"
            echo "- Changelog update automation: enabled"
            echo "- Automated pre-tag workflow gates: ci, smoke, docs, integration"
            echo
            echo "## Published Artifacts"
            while read -r artifact; do
              [ -n "${artifact}" ] || continue
              echo "- ${artifact}"
            done < release-artifacts.txt
            echo "- SHA256SUMS"
          } > release-checklist.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            teampulsebridge-*
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem
            release-checklist.md

      - name: Checkout default branch for changelog update
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Restore release notes
        shell: bash
        run: cp /tmp/release-notes.md release-notes.md

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo >> CHANGELOG.md
          fi
          tmpfile=$(mktemp)
          head -n 1 CHANGELOG.md > "$tmpfile"
          echo >> "$tmpfile"
          cat release-notes.md >> "$tmpfile"
          echo >> "$tmpfile"
          tail -n +2 CHANGELOG.md >> "$tmpfile"
          mv "$tmpfile" CHANGELOG.md

      - name: Commit and push changelog update
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
