apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ingestion-gateway
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause:
            duration: 3m
        - analysis:
            templates:
              - templateName: ingestion-gateway-error-budget
              - templateName: ingestion-gateway-queue-resilience
            args:
              - name: prometheus-address
                value: http://prometheus.monitoring.svc.cluster.local:9090
        - setWeight: 25
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: ingestion-gateway-error-budget
              - templateName: ingestion-gateway-queue-resilience
            args:
              - name: prometheus-address
                value: http://prometheus.monitoring.svc.cluster.local:9090
        - setWeight: 50
        - pause:
            duration: 10m
        - analysis:
            templates:
              - templateName: ingestion-gateway-error-budget
              - templateName: ingestion-gateway-queue-resilience
            args:
              - name: prometheus-address
                value: http://prometheus.monitoring.svc.cluster.local:9090
  template:
    spec:
      containers:
        - name: ingestion-gateway
          image: ghcr.io/kill74/teampulse-ingestion-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: ingestion-gateway-config
            - secretRef:
                name: ingestion-gateway-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
