name: Setup Ingestion Gateway Go
description: Set up Go and download dependencies for the ingestion-gateway service

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.26.x"
  service-path:
    description: Path to the Go service module
    required: false
    default: services/ingestion-gateway
  download-deps:
    description: Whether to run go mod download
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: ${{ inputs.service-path }}/go.sum

    - name: Download dependencies
      if: ${{ inputs.download-deps == 'true' }}
      shell: bash
      run: |
        cd "${{ inputs.service-path }}"
        go mod download
