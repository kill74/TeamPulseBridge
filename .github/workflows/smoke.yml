name: smoke

on:
  pull_request:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and start stack
        run: docker compose -f services/ingestion-gateway/docker-compose.integration.yml up -d --build

      - name: Wait for health endpoint
        shell: bash
        run: |
          set -e
          # Wait up to 180s for the service to become healthy
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              echo "healthz is up"
              exit 0
            fi
            sleep 3
          done
          echo "healthz did not become ready in time"
          exit 1

      - name: Validate metrics endpoint
        run: |
          set -e
          curl -fsS http://localhost:8080/metrics | grep -q "go_"

      - name: Show compose status
        if: always()
        run: docker compose -f services/ingestion-gateway/docker-compose.integration.yml ps

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f services/ingestion-gateway/docker-compose.integration.yml logs --no-color --tail=200

      - name: Shutdown stack
        if: always()
        run: docker compose -f services/ingestion-gateway/docker-compose.integration.yml down -v
