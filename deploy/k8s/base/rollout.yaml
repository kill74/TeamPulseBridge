apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ingestion-gateway
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion-gateway
  strategy:
    canary:
      maxSurge: 25%
      maxUnavailable: 0
      steps:
        - setWeight: 10
        - pause: {duration: 2m}
        - analysis:
            templates:
              - templateName: ingestion-gateway-error-budget
              - templateName: ingestion-gateway-queue-resilience
              - templateName: ingestion-gateway-security-rejection
            args:
              - name: prometheus-address
                value: http://teampulse-prometheus.monitoring.svc.cluster.local:9090
        - setWeight: 50
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: ingestion-gateway-error-budget
              - templateName: ingestion-gateway-queue-resilience
              - templateName: ingestion-gateway-security-rejection
            args:
              - name: prometheus-address
                value: http://teampulse-prometheus.monitoring.svc.cluster.local:9090
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestion-gateway
    spec:
      serviceAccountName: ingestion-gateway
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ingestion-gateway
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ingestion-gateway
      containers:
        - name: ingestion-gateway
          image: ghcr.io/kill74/teampulse-ingestion-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: ingestion-gateway-config
            - secretRef:
                name: ingestion-gateway-secrets
          volumeMounts:
            - name: data-dir
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data-dir
          emptyDir:
            sizeLimit: 512Mi
            medium: Memory
      securityContext:
        seccompProfile:
          type: RuntimeDefault
