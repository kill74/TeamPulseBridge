apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-gateway-config
data:
  ENVIRONMENT: "prod"
  QUEUE_BUFFER: "8192"
  QUEUE_WORKERS: "8"
  QUEUE_BULKHEAD_BUFFER_PER_SOURCE: "2048"
  PUBSUB_PUBLISH_GOROUTINES: "8"
  PUBSUB_MAX_OUTSTANDING_MESSAGES: "5000"
  PUBSUB_MAX_OUTSTANDING_BYTES: "134217728"
  PUBSUB_FLOW_CONTROL_BEHAVIOR: "signal_error"
  SOURCE_RATE_LIMIT_DEFAULT: "300"
  REQUEST_TIMEOUT_SEC: "20"
  QUEUE_BACKPRESSURE_SOFT_LIMIT_PERCENT: "70"
  QUEUE_BACKPRESSURE_HARD_LIMIT_PERCENT: "90"
  QUEUE_FAILURE_BUDGET_PERCENT: "15"
  QUEUE_FAILURE_BUDGET_WINDOW: "150"
  QUEUE_FAILURE_BUDGET_MIN_SAMPLES: "30"
  QUEUE_THROTTLE_RETRY_AFTER_SEC: "5"
  SECURITY_AUDIT_RETENTION_DAYS: "180"
