name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build changelog entry
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1 || true)
          {
            echo "## ${TAG} - $(date +%Y-%m-%d)"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo
          } > release-notes.md

      - name: Preserve release notes across checkout
        shell: bash
        run: cp release-notes.md /tmp/release-notes.md

      - name: Build release artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          git archive --format=tar.gz --output "teampulsebridge-${VERSION}-source.tar.gz" "$TAG"
          git archive --format=zip --output "teampulsebridge-${VERSION}-source.zip" "$TAG"
          sha256sum \
            "teampulsebridge-${VERSION}-source.tar.gz" \
            "teampulsebridge-${VERSION}-source.zip" > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.9.1

      - name: Sign release artifacts (keyless)
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          cosign sign-blob --yes \
            --output-signature "teampulsebridge-${VERSION}-source.tar.gz.sig" \
            --output-certificate "teampulsebridge-${VERSION}-source.tar.gz.pem" \
            "teampulsebridge-${VERSION}-source.tar.gz"

          cosign sign-blob --yes \
            --output-signature "teampulsebridge-${VERSION}-source.zip.sig" \
            --output-certificate "teampulsebridge-${VERSION}-source.zip.pem" \
            "teampulsebridge-${VERSION}-source.zip"

          cosign sign-blob --yes \
            --output-signature "SHA256SUMS.sig" \
            --output-certificate "SHA256SUMS.pem" \
            SHA256SUMS

      - name: Verify signed artifacts
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${TAG}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          sha256sum -c SHA256SUMS

          cosign verify-blob \
            --signature "teampulsebridge-${VERSION}-source.tar.gz.sig" \
            --certificate "teampulsebridge-${VERSION}-source.tar.gz.pem" \
            --certificate-identity "$CERT_IDENTITY" \
            --certificate-oidc-issuer "$CERT_ISSUER" \
            "teampulsebridge-${VERSION}-source.tar.gz"

          cosign verify-blob \
            --signature "teampulsebridge-${VERSION}-source.zip.sig" \
            --certificate "teampulsebridge-${VERSION}-source.zip.pem" \
            --certificate-identity "$CERT_IDENTITY" \
            --certificate-oidc-issuer "$CERT_ISSUER" \
            "teampulsebridge-${VERSION}-source.zip"

          cosign verify-blob \
            --signature "SHA256SUMS.sig" \
            --certificate "SHA256SUMS.pem" \
            --certificate-identity "$CERT_IDENTITY" \
            --certificate-oidc-issuer "$CERT_ISSUER" \
            SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            teampulsebridge-*-source.tar.gz
            teampulsebridge-*-source.tar.gz.sig
            teampulsebridge-*-source.tar.gz.pem
            teampulsebridge-*-source.zip
            teampulsebridge-*-source.zip.sig
            teampulsebridge-*-source.zip.pem
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem

      - name: Checkout default branch for changelog update
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Restore release notes
        shell: bash
        run: cp /tmp/release-notes.md release-notes.md

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo >> CHANGELOG.md
          fi
          tmpfile=$(mktemp)
          head -n 1 CHANGELOG.md > "$tmpfile"
          echo >> "$tmpfile"
          cat release-notes.md >> "$tmpfile"
          echo >> "$tmpfile"
          tail -n +2 CHANGELOG.md >> "$tmpfile"
          mv "$tmpfile" CHANGELOG.md

      - name: Commit and push changelog update
        shell: bash
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
