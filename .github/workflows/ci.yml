name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (backend disabled)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup ingestion-gateway Go
        uses: ./.github/actions/setup-ingestion-gateway-go

      - name: Go fmt check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --config ../../.golangci.yml ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        run: govulncheck -format text ./...

  contract-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup ingestion-gateway Go
        uses: ./.github/actions/setup-ingestion-gateway-go

      - name: Contract quality checks
        run: make ci-contract

  race-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup ingestion-gateway Go
        uses: ./.github/actions/setup-ingestion-gateway-go

      - name: Race tests
        run: go test -race ./...

  policy-as-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python policy tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov==3.2.469 python-hcl2==8.1.2

      - name: Install kubectl
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSLo "$HOME/.local/bin/kubectl" "https://dl.k8s.io/release/v1.34.1/bin/linux/amd64/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          kubectl version --client --output=yaml

      - name: Policy-as-code checks
        run: make ci-policy
