services:
  pubsub-emulator:
    image: google/cloud-sdk:emulators
    container_name: teampulse-pubsub-emulator
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - '8085:8085'
    profiles:
      - pubsub-local
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/127.0.0.1/8085"']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s

  ingestion-gateway:
    build:
      context: ./services/ingestion-gateway
      dockerfile: Dockerfile
    container_name: teampulse-ingestion-gateway
    environment:
      PORT: 8080
      REQUIRE_SECRETS: 'true'
      QUEUE_BACKEND: log
      ADMIN_AUTH_ENABLED: 'true'
      ADMIN_JWT_ISSUER: "dummy-issuer"
      ADMIN_JWT_AUDIENCE: "dummy-audience"
      ADMIN_JWT_SECRET: "dummy-secret-must-be-at-least-32-chars-long"
      SLACK_SIGNING_SECRET: "dummy-slack-secret"
      GITHUB_WEBHOOK_SECRET: "dummy-github-secret"
      GITLAB_WEBHOOK_TOKEN: "dummy-gitlab-token"
      TEAMS_CLIENT_STATE: "dummy-teams-client-state"
      ENVIRONMENT: local
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://teampulse:secret@postgres:5432/teampulse?sslmode=disable
      RATE_LIMIT_BACKEND: redis
      # Uncomment below to enable Pub/Sub emulator backend
      # QUEUE_BACKEND: pubsub
      # PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      # PUBSUB_PROJECT_ID: test-project
    ports:
      - '8080:8080'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Uncomment the depends_on below to enable Pub/Sub integration
    #   pubsub-emulator:
    #     condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: teampulse-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: teampulse-postgres
    environment:
      POSTGRES_USER: teampulse
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: teampulse
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teampulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: teampulse-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - ingestion-gateway

  grafana:
    image: grafana/grafana:11.2.0
    container_name: teampulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
    ports:
      - '3000:3000'
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
